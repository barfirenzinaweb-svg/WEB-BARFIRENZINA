backend:
  name: github
  repo: barfirenzinaweb-svg/WEB-BARFIRENZINA
  branch: main
  base_url: https://www.barfirenzina.com.ar
  auth_endpoint: api/auth

# Las imágenes que suba la clienta van a la carpeta assets/
media_folder: "assets"
public_folder: "assets"

locale: "es"

collections:
  - name: "contenido"
    label: "Contenido de la web"
    files:
      - name: "site"
        label: "Textos e imágenes del sitio"
        file: "content/site.json"
        editor:
          preview: false
        fields:
          - label: "Hero (portada)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Texto del botón", name: "boton", widget: "string" }

          - label: "Bloque Acompañamiento"
            name: "acompanamiento"
            widget: "object"
            fields:
              - { label: "Pre-título", name: "eyebrow", widget: "string" }
              - { label: "Título (parte normal)", name: "titulo_1", widget: "string" }
              - { label: "Título (palabra destacada en dorado)", name: "titulo_em", widget: "string" }
              - { label: "Párrafo", name: "parrafo", widget: "text" }
              - { label: "Texto del botón", name: "boton", widget: "string" }

          - label: "Bloque Ingredientes"
            name: "ingredientes"
            widget: "object"
            fields:
              - { label: "Pre-título", name: "eyebrow", widget: "string" }
              - { label: "Título (parte normal)", name: "titulo_1", widget: "string" }
              - { label: "Título (palabra destacada)", name: "titulo_em", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - label: "Lista de ingredientes"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Nombre", name: "nombre", widget: "string" }
                  - { label: "Detalle (texto pequeño al lado)", name: "meta", widget: "string" }

          - label: "Sección Recetas / Productos"
            name: "recetas"
            widget: "object"
            fields:
              - { label: "Pre-título", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Productos (podés agregar, editar y borrar tarjetas)"
                name: "productos"
                widget: "list"
                summary: "{{fields.nombre}} — ${{fields.precio}}"
                fields:
                  - { label: "ID único (sin espacios, ej: crudo, cocido, kitten)", name: "id", widget: "string", hint: "Identificador para el carrito. NO repetir entre productos." }
                  - { label: "Nombre del producto", name: "nombre", widget: "string" }
                  - { label: "Categoría (ej: Receta Cruda)", name: "categoria", widget: "string" }
                  - { label: "Imagen principal del producto", name: "imagen", widget: "image", required: false, hint: "Foto principal (la que se ve primero). Si subís más en 'Galería' abajo, se muestra carrusel." }
                  - label: "Galería de fotos (carrusel) — opcional"
                    name: "galeria"
                    widget: "list"
                    required: false
                    hint: "Subí varias fotos extra para mostrar como carrusel. La imagen principal de arriba es la primera del carrusel."
                    field: { label: "Foto", name: "foto", widget: "image" }
                  - label: "Encuadre de las fotos (cómo se centran)"
                    name: "posicion_foto"
                    widget: "select"
                    required: false
                    default: "center"
                    hint: "Si tu foto se ve cortada, elegí qué parte querés que quede visible. Aplica a TODAS las fotos de este producto."
                    options:
                      - { label: "Centro (default)", value: "center" }
                      - { label: "Arriba", value: "top" }
                      - { label: "Abajo", value: "bottom" }
                      - { label: "Izquierda", value: "left" }
                      - { label: "Derecha", value: "right" }
                      - { label: "Arriba-Izquierda", value: "top left" }
                      - { label: "Arriba-Derecha", value: "top right" }
                      - { label: "Abajo-Izquierda", value: "bottom left" }
                      - { label: "Abajo-Derecha", value: "bottom right" }
                  - { label: "Descripción", name: "descripcion", widget: "text" }
                  - { label: "Precio (solo número, sin $)", name: "precio", widget: "string" }
                  - { label: "Precio anterior (vacío = sin descuento)", name: "precio_anterior", widget: "string", required: false }
                  - { label: "Peso (ej: 500 g)", name: "peso", widget: "string", default: "500 g", required: false }
                  - { label: "Etiqueta destacada (ej: Más Vendido / Suave / Nuevo)", name: "tag", widget: "string", required: false }
                  - { label: "¿Etiqueta en color dorado?", name: "tag_gold", widget: "boolean", default: false, required: false }
                  - { label: "Cinta superior (ej: Bestseller). Vacío = sin cinta", name: "ribbon", widget: "string", required: false }
                  - { label: "Cantidad de reseñas (ej: 348)", name: "reviews_count", widget: "string", default: "0", required: false }
                  - { label: "Beneficios (lista, ej: Sin conservantes)", name: "highlights", widget: "list", field: { label: "Beneficio", name: "item", widget: "string" } }

          - label: "Bloque Comunidad"
            name: "comunidad"
            widget: "object"
            fields:
              - { label: "Pre-título", name: "eyebrow", widget: "string" }
              - { label: "Intro", name: "intro", widget: "string" }
              - { label: "Título (parte normal)", name: "titulo_1", widget: "string" }
              - { label: "Título (parte destacada)", name: "titulo_em", widget: "string" }
              - { label: "Párrafo", name: "parrafo", widget: "text" }

          - label: "Reseñas / Testimonios"
            name: "resenas"
            widget: "object"
            fields:
              - { label: "Pre-título", name: "eyebrow", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Subtítulo", name: "subtitulo", widget: "text" }
              - label: "Reseñas"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Texto de la reseña", name: "texto", widget: "text" }
                  - { label: "Nombre del cliente", name: "nombre", widget: "string" }
                  - { label: "Rol / ubicación", name: "rol", widget: "string" }

          - label: "CTA Final"
            name: "cta_final"
            widget: "object"
            fields:
              - { label: "Título (parte normal)", name: "titulo_1", widget: "string" }
              - { label: "Título (parte destacada)", name: "titulo_em", widget: "string" }
              - { label: "Párrafo", name: "parrafo", widget: "text" }
              - { label: "Texto del botón", name: "boton", widget: "string" }

          - label: "Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "WhatsApp (solo números, con código país)", name: "whatsapp", widget: "string" }
              - { label: "URL de Instagram", name: "instagram_url", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
