<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<title>¡Gracias por tu compra! · BARFirenzina</title>
<link rel="icon" type="image/png" href="/assets/logo.jpg">
<style>
  :root{
    --olive:#323915; --cream:#F6F6E9; --gold:#A38E48; --sage:#7C8456;
    --display:"Playfair Display", Georgia, serif;
    --subtitle:"Playfair Display", "Inter", system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--display);
    background:#f1ecd5;color:var(--olive);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:40px 20px;line-height:1.5;
  }
  .wrap{
    max-width:580px;text-align:center;
  }
  .check{
    width:88px;height:88px;border-radius:50%;
    background:var(--sage);
    display:inline-flex;align-items:center;justify-content:center;
    color:var(--cream);margin-bottom:28px;
    animation:pop .55s cubic-bezier(.2,1.5,.5,1.2);
  }
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  .check svg{width:48px;height:48px}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--gold);font-weight:700;margin-bottom:14px;
  }
  h1{
    font-family:var(--display);
    font-size:clamp(30px, 5vw, 50px);
    font-weight:800;text-transform:uppercase;line-height:1;
    margin-bottom:18px;color:var(--olive);
  }
  h1 em{color:var(--gold);font-style:italic}
  p{
    font-size:16px;color:rgba(50,57,21,.75);
    max-width:460px;margin:0 auto 28px;line-height:1.6;
  }
  .order-summary{
    background:rgba(255,255,255,.55);
    border:1px solid rgba(50,57,21,.12);
    border-radius:14px;
    padding:18px 22px;
    text-align:left;
    margin:0 auto 28px;
    max-width:440px;
    font-size:14px;
    color:var(--olive);
  }
  .order-summary h3{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    font-weight:700;color:var(--gold);margin-bottom:12px;text-align:center;
  }
  .order-summary ul{list-style:none;margin:0;padding:0}
  .order-summary li{
    display:flex;justify-content:space-between;
    padding:6px 0;border-bottom:1px dashed rgba(50,57,21,.12);
    font-family:"Times New Roman", Times, serif;
  }
  .order-summary li:last-child{border-bottom:none}
  .order-summary .total{
    margin-top:8px;padding-top:10px;border-top:1.5px solid rgba(50,57,21,.2);
    font-weight:700;font-size:16px;
  }
  .actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    padding:15px 30px;border-radius:999px;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    font-weight:700;text-decoration:none;
    border:1.5px solid var(--olive);
    transition:all .25s ease;
  }
  .btn svg{width:18px;height:18px;flex-shrink:0}
  .btn-wa{background:var(--olive);color:var(--cream);border-color:var(--olive)}
  .btn-wa:hover{background:var(--gold);border-color:var(--gold);transform:translateY(-2px)}
  .btn-secondary{background:transparent;color:var(--olive)}
  .btn-secondary:hover{background:var(--olive);color:var(--cream)}
  .wa-callout{
    background:rgba(124,132,86,.12);
    border:1px solid rgba(124,132,86,.3);
    border-radius:12px;padding:14px 18px;
    margin:0 auto 22px;max-width:460px;
    font-size:13px;color:rgba(50,57,21,.78);
    line-height:1.5;
  }
  .wa-callout strong{color:var(--olive);font-weight:700}
</style>
</head>
<body>
  <div class="wrap">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="eyebrow">Pago aprobado</p>
    <h1>¡Gracias por tu <em>compra!</em></h1>
    <p>Recibimos tu pedido. <strong>Confirmá tu compra por WhatsApp</strong> para coordinar la entrega refrigerada — te respondemos en el día.</p>

    <div id="orderSummary"></div>

    <div class="wa-callout">
      Hacé click en el botón verde y te abrimos WhatsApp con tu pedido cargado. Solo tenés que mandarlo.
    </div>

    <div class="actions">
      <a id="waBtn" href="https://wa.me/5491154846054" target="_blank" rel="noopener" class="btn btn-wa">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.5 14.4c-.3-.2-1.8-.9-2.1-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-1 1.2-.2.2-.4.2-.6.1-.3-.1-1.2-.4-2.3-1.4-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6l.4-.5c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.2 3 .1.2 2 3 4.8 4.2.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.8-.7 2-1.4.2-.7.2-1.3.2-1.4-.1-.1-.3-.2-.5-.3zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 4.9L2 22l5.3-1.3c1.4.8 3 1.2 4.7 1.2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/>
        </svg>
        Confirmar por WhatsApp
      </a>
      <a href="/" class="btn btn-secondary">Volver al sitio</a>
    </div>
  </div>

  <script>
    (function(){
      var WA_PHONE = '5491154846054';
      var order = null;
      try { order = JSON.parse(localStorage.getItem('barfLastOrder') || 'null'); } catch(_){}

      var summary = document.getElementById('orderSummary');
      var waBtn = document.getElementById('waBtn');
      var msg = '¡Hola! Acabo de hacer un pedido en la web y necesito confirmarlo.';

      if (order && order.items && order.items.length){
        var html = '<div class="order-summary"><h3>Tu pedido</h3><ul>';
        order.items.forEach(function(i){
          html += '<li><span>'+ escapeHtml(i.name) +' × '+ i.qty +'</span><span>$'+ (i.price * i.qty).toFixed(2) +'</span></li>';
        });
        html += '<li class="total"><span>Total</span><span>$'+ Number(order.total || 0).toFixed(2) +'</span></li>';
        html += '</ul></div>';
        summary.innerHTML = html;

        var lines = [];
        lines.push('¡Hola! Acabo de hacer un pedido en la web. Quiero confirmarlo:');
        lines.push('');
        order.items.forEach(function(i){
          lines.push('• '+ i.name +' × '+ i.qty +' — $'+ (i.price * i.qty).toFixed(2));
        });
        lines.push('');
        lines.push('Total: $'+ Number(order.total || 0).toFixed(2));
        lines.push('');
        lines.push('Quedo a la espera de la coordinación para la entrega. ¡Gracias!');
        msg = lines.join('\n');
      }

      waBtn.href = 'https://wa.me/'+ WA_PHONE +'?text='+ encodeURIComponent(msg);

      // Vaciar el carrito al confirmar el pago. El lastOrder se mantiene
      // por si el usuario refresca la página o vuelve a entrar.
      try { localStorage.removeItem('barf_cart_v2'); } catch(_){}

      function escapeHtml(s){
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    })();
  </script>
</body>
</html>
