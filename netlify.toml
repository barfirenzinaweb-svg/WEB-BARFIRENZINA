# Evita que el navegador cachee el panel de administración y el contenido editable.
# Así el panel /admin y los textos siempre se sirven frescos tras cada publicación.

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
